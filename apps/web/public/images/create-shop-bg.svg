<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <!-- Soft glow blobs -->
  <circle cx="180" cy="160" r="120" fill="#3D5FD9" opacity="0.18"/>
  <circle cx="1280" cy="220" r="140" fill="#F4741F" opacity="0.14"/>
  <circle cx="240" cy="720" r="160" fill="#2E7D4F" opacity="0.12"/>
  <circle cx="1180" cy="700" r="110" fill="#3D5FD9" opacity="0.16"/>

  <!-- Stars -->
  <g fill="#F6C344" opacity="0.9">
    <path d="M120 90l6 14 16 2-12 11 3 16-13-8-13 8 3-16-12-11 16-2z"/>
    <path d="M1320 80l5 12 13 2-10 9 2 13-10-6-10 6 2-13-10-9 13-2z"/>
    <path d="M980 140l4 10 11 1-8 8 2 11-9-5-9 5 2-11-8-8 11-1z"/>
    <path d="M70 480l5 11 12 2-9 8 2 12-10-6-10 6 2-12-9-8 12-2z"/>
    <path d="M1380 520l4 9 10 1-7 7 2 10-9-5-9 5 2-10-7-7 10-1z"/>
  </g>

  <!-- Plus accents -->
  <g stroke="#A8B3CF" stroke-width="2.5" opacity="0.55" stroke-linecap="round">
    <path d="M260 60v18M251 69h18"/>
    <path d="M1100 40v16M1092 48h16"/>
    <path d="M60 300v14M53 307h14"/>
    <path d="M1360 300v16M1352 308h16"/>
  </g>

  <!-- Gift box (top-right) -->
  <g transform="translate(1180 90)">
    <rect x="8" y="28" width="70" height="52" rx="6" fill="#2E7D4F"/>
    <rect x="8" y="18" width="70" height="16" rx="4" fill="#3A9A62"/>
    <rect x="38" y="18" width="10" height="62" fill="#F6F8FC" opacity="0.9"/>
    <path d="M43 18c-12-14-28-8-28 4 0 10 14 14 28 18 14-4 28-8 28-18 0-12-16-18-28-4z" fill="#F4741F"/>
  </g>

  <!-- Gift box (bottom-left) -->
  <g transform="translate(90 680) rotate(-8)">
    <rect x="8" y="28" width="58" height="44" rx="5" fill="#3D5FD9"/>
    <rect x="8" y="18" width="58" height="14" rx="4" fill="#5B7BE8"/>
    <rect x="32" y="18" width="9" height="54" fill="#F6F8FC" opacity="0.9"/>
    <path d="M36.5 18c-10-12-24-7-24 3 0 8 12 12 24 15 12-3 24-7 24-15 0-10-14-15-24-3z" fill="#F4741F"/>
  </g>

  <!-- SWAG badge -->
  <g transform="translate(1080 620) rotate(6)">
    <rect x="0" y="0" width="150" height="52" rx="12" fill="#F4741F"/>
    <text x="75" y="34" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif" font-size="26" font-weight="900" fill="#fff" letter-spacing="2">SWAG</text>
  </g>

  <!-- KUDOS script pill -->
  <g transform="translate(70 120) rotate(-12)">
    <rect x="0" y="0" width="150" height="48" rx="24" fill="#5B4BDB"/>
    <text x="75" y="31" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#fff">Kudos</text>
  </g>

  <!-- You're amazing badge -->
  <g transform="translate(1240 380)">
    <circle cx="48" cy="48" r="46" fill="#F6C344"/>
    <circle cx="48" cy="48" r="38" fill="#FFF6D6"/>
    <text x="48" y="42" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="800" fill="#1A1B22" letter-spacing="0.5">YOU'RE</text>
    <text x="48" y="58" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="900" fill="#1A1B22">AMAZING</text>
  </g>

  <!-- Speech bubble -->
  <g transform="translate(180 380) rotate(-4)">
    <rect x="0" y="0" width="150" height="56" rx="16" fill="#fff"/>
    <path d="M28 56l-8 16 24-12z" fill="#fff"/>
    <text x="75" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1A1B22">You did it!</text>
  </g>

  <!-- Shelf Merch chip -->
  <g transform="translate(980 70) rotate(8)">
    <rect x="0" y="0" width="170" height="44" rx="10" fill="#fff" opacity="0.95"/>
    <text x="85" y="28" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#3D5FD9">Shelf Merch</text>
  </g>

  <!-- Confetti dots -->
  <g>
    <circle cx="320" cy="200" r="5" fill="#F4741F" opacity="0.8"/>
    <circle cx="400" cy="80" r="4" fill="#3D5FD9" opacity="0.7"/>
    <circle cx="1050" cy="260" r="5" fill="#2E7D4F" opacity="0.75"/>
    <circle cx="900" cy="760" r="4" fill="#F6C344" opacity="0.8"/>
    <circle cx="520" cy="820" r="5" fill="#5B4BDB" opacity="0.7"/>
    <circle cx="700" cy="60" r="3.5" fill="#F4741F" opacity="0.7"/>
    <circle cx="80" cy="560" r="4" fill="#F6C344" opacity="0.75"/>
    <circle cx="1360" cy="640" r="5" fill="#3D5FD9" opacity="0.7"/>
  </g>

  <!-- Small star bursts -->
  <g fill="#fff" opacity="0.35">
    <circle cx="450" cy="300" r="2"/>
    <circle cx="860" cy="200" r="2"/>
    <circle cx="300" cy="600" r="2"/>
    <circle cx="1100" cy="500" r="2"/>
  </g>
</svg>
