# HAProxy load balancer for the ShelfMerch API — runs on the front VPS(es).
# TLS is terminated at Cloudflare (origin can stay HTTP here, or add a cert and a
# `bind :443 ssl`); HAProxy round-robins to the Swarm nodes' published API port
# and health-checks each with the readiness probe so a draining/unhealthy replica
# is pulled out of rotation.
#
# For LB high-availability, run this on VPS-A and VPS-B and float a virtual IP
# between them with keepalived (VRRP) — Cloudflare/DNS points at the VIP.

global
    log stdout format raw local0 info
    maxconn 20000

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    retries 3

frontend http_in
    bind :80
    # Trust Cloudflare's forwarded client IP (matches app `trust proxy`).
    option forwardfor
    default_backend shelfmerch_api

backend shelfmerch_api
    balance roundrobin
    option httpchk GET /api/v1/health/ready
    http-check expect status 200
    default-server inter 10s fall 3 rise 2 maxconn 2000
    # One line per Swarm node running the api service (routing mesh forwards to a
    # healthy replica on that node). Replace with your real VPS IPs.
    server vps-a 10.0.0.1:8080 check
    server vps-b 10.0.0.2:8080 check
    server vps-c 10.0.0.3:8080 check
