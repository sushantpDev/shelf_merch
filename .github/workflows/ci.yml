name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs vitest for @shelfmerch/api, which includes app-boot.test.js —
      # a native-Node import of app.js that catches load failures (e.g. a
      # duplicate import from a bad merge) the Vitest transform alone tolerates.
      - name: Run API tests
        run: npm test
        env:
          NODE_ENV: test
