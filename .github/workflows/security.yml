name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      # --no-git scans the working tree (current files), avoiding false positives
      # from secrets that may exist in historical commits.
      - name: Run gitleaks
        run: gitleaks detect --no-git --config .gitleaks.toml --redact --verbose

  dependency-audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Advisory only for now: the tree ships known-vulnerable transitive deps
      # (e.g. xlsx), so the audit output is surfaced in the log but does not fail
      # the check (`|| true`). Remove `|| true` to make it blocking once those
      # are remediated (see docs/security_hardening_plan.md §B4).
      - name: Audit production dependencies (non-blocking)
        run: npm audit --omit=dev --audit-level=high || true
